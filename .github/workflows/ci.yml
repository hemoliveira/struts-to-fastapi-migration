name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  legacy-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B package

  modernized-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernized-python/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: modernized-python/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -v

  modernized-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modernized-python/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modernized-python/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
