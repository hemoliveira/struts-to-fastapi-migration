services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderco
      POSTGRES_PASSWORD: orderco
      POSTGRES_DB: orderco
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./modernized-python/backend
    environment:
      - DATABASE_URL=postgresql://orderco:orderco@postgres:5432/orderco
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build: ./modernized-python/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  legacy-java:
    build: ./legacy-java
    ports:
      - "8081:8080"

volumes:
  pgdata:
